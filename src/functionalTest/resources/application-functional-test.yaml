spring:
  application:
    name: core
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  test:
    mockmvc:
      print: LOG_DEBUG
logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate: DEBUG

